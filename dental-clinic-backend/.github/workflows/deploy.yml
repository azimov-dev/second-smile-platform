name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 4.213.160.184 >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          ssh -o StrictHostKeyChecking=no azimov@4.213.160.184 "
            cd /home/azimov/dental-clinic-backend &&
            git pull origin main --rebase &&
            npm install --production &&
            pm2 restart dental-backend || pm2 start index.js --name dental-backend &&
            echo 'Deploy successful!'
          "
