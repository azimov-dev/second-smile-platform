# Nginx configuration for Second Smile multi-tenant platform
# Place this in /etc/nginx/sites-available/ and symlink to sites-enabled

# API backend
server {
    listen 80;
    server_name api.second-smile.uz;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# Super admin panel
server {
    listen 80;
    server_name admin.second-smile.uz;

    root /var/www/super-admin-panel/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Tenant frontend (wildcard subdomain)
server {
    listen 80;
    server_name *.second-smile.uz;

    root /var/www/second-smile/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}

# Main domain redirect
server {
    listen 80;
    server_name second-smile.uz www.second-smile.uz;

    root /var/www/second-smile/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
